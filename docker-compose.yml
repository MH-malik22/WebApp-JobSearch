services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudops
      POSTGRES_PASSWORD: cloudops
      POSTGRES_DB: cloudops_jobs
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudops -d cloudops_jobs"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cloudops:cloudops@db:5432/cloudops_jobs
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "node src/db/migrate.js && node src/server.js"

  worker:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cloudops:cloudops@db:5432/cloudops_jobs
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    command: ["node", "src/workers/index.js"]

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  db_data:
