name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Use --no-audit / --no-fund to keep CI logs clean. We allow installing
      # without a lock file; CI is intentionally tolerant during early
      # iteration. Switch to `npm ci` once package-lock.json is committed.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Syntax check
        run: |
          for f in src/server.js src/services/*.js src/routes/*.js src/utils/*.js src/workers/*.js src/middleware/*.js src/config/*.js; do
            node --check "$f" || exit 1
          done

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: cloudops-jobs-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: cloudops-jobs-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
